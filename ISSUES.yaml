# TannedPy — Issue Tracker
# Generated from docs/reviews/2026-07-03-multi-model-code-review.md
# plus reviewer enhancements (see `meta_review` and per-issue `reviewer_note`).
#
# Schema (per issue):
#   id            F1..F26 — stable identifier from the review
#   title         short human label
#   theme         A|B|C|D|E|F  (grouping from the report)
#   category      guard_bypass | false_positive | robustness | adapter_parity |
#                 structure | documentation
#   verdict       confirmed | partially_confirmed | mischaracterized
#   exploit       allow | deny | none
#                 allow  = guard wrongly permits (bypass)
#                 deny   = guard wrongly blocks (false positive)
#                 none   = no exploit; hardening/cosmetic/structural
#   tags          [everyday] and/or [adversarial] and/or [injection]
#   severity      high | medium | low | cosmetic
#   priority_rank 1 = highest real-world risk (from report section 3; ties share a rank)
#   status        open | wontfix | fixed   (start: open)
#   locations     source references (file:line)
#   evidence      how it was verified
#   fixes         recommendation IDs that address it (see `recommendations`)
#   reviewer_note optional — enhancement/caveat added during the review-of-the-review

meta:
  project: TannedPy
  report: docs/reviews/2026-07-03-multi-model-code-review.md
  report_date: 2026-07-03
  pipeline: "4x Sonnet finders -> Opus compiler -> Fable verifier -> reviewer enhancements"
  guard_file: hooks/scripts/tannedpy_guard.py
  stats:
    total: 26
    confirmed: 22
    partially_confirmed: 3      # F13, F23, F26
    mischaracterized: 1         # F20
    disproven: 0
  thesis: >
    A PreToolUse hook is inherently advisory: an agent can append the escape-hatch
    marker or simply comply differently, so nothing at this layer stops a determined
    or jailbroken model. Treat the guard as a guardrail-for-the-well-behaved. Invest
    in the [everyday] fixes (R1-R4); pursue a real parser / allow-list (R6) only if
    TannedPy is to be marketed as a security control rather than a workflow nudge.

meta_review:
  # Enhancements and push-backs added while auditing the report itself.
  verdict: high-quality — reproducible, honest about uncertainty, organized around one root cause
  notes:
    - id: F21_shebang_wrinkle
      refs: [F21]
      note: >
        Three-way mismatch the report missed. The guard has no uv check (confirmed:
        only the shebang, docstring, and `word == "uv"` allow reference uv). BUT the
        shebang is `#!/usr/bin/env -S uv run --script` (line 1), so on a uv-less
        machine the guard cannot launch at all — env fails to find uv, the hook errors,
        Claude Code falls open. So the README's "goes inert without uv" is accidentally
        true via the shebang, while the report's "the guard still denies every python
        call" assumes a guard that can't actually execute in that scenario. Cleanest
        fix may be to make the README honest about *why* it's inert, not to add
        redundant uv-presence logic.
    - id: F10_is_noise
      refs: [F10]
      note: >
        Non-exploitable regex nuance (match+$ vs fullmatch) reported at the same
        granularity as full bypasses. Slightly pads the finding count; keep but treat
        as cosmetic.
    - id: F13_threat_model
      refs: [F13]
      note: >
        Softest finding. The DoS needs an attacker-supplied giant arg, but the attacker
        here is the very agent being guarded — which can already just append the escape
        hatch (F6). The threat model is somewhat incoherent with the advisory-hook framing.
    - id: F23_unresolved
      refs: [F23]
      note: >
        Only finding with no verification path (can't execute pi). The contradictory
        opencode vs pi READMEs it cites are the more actionable defect than the symlink
        theory itself.

