recommendations:
  - id: R1
    title: Recurse into command-valued args; expand separators/constructs
    fixes: [F1, F2, F3, F4, F5, F7, F8, F9, F10]
    where: [hooks/scripts/tannedpy_guard.py, "adapters TS splitSegments/extractInvocation"]
    detail: >
      After extracting the leading word, if it is a shell-invoking command
      (sh/bash/zsh/eval/env in -c/exec position, timeout/doas/setsid/nice/ssh/xargs,
      find ... -exec, command), take the command-valued string argument and re-run
      evaluate() recursively. Extend split_segments to break on a lone & and to descend
      into $(...), backticks, and <(...). For `command`, treat as a lookup only when -v/-V
      is present. Honest caveat: whack-a-mole on a hand-rolled parser; durable fix is R6.

  - id: R2
    title: Tolerant version_args and heredoc handling
    fixes: [F11, F12]
    where: [hooks/scripts/tannedpy_guard.py:128, patterns.json:16]
    detail: >
      F12: strip trailing redirection tokens (2>&1, >...) before the exact --version match,
      or treat as a version check when the first arg is --version/-V and the rest are only
      redirections/pipes. F11: teach split_segments heredoc awareness — on <<['"]?WORD,
      swallow lines until the terminator instead of splitting/scanning the body. Quick wins,
      high UX payoff.

  - id: R3
    title: Scope the escape hatch to the segment; align docs
    fixes: [F6, F22]
    where: [hooks/scripts/tannedpy_guard.py:116]
    detail: >
      Move the escape_hatch check inside the per-segment loop so the marker only whitelists
      the segment it trails, and require it as a trailing # comment rather than an
      anywhere-substring. Matches what the docs already promise ("this exact command").

  - id: R4
    title: Fail closed-ish and loud on malformed input; cap input size
    fixes: [F14, F13]
    where: [hooks/scripts/tannedpy_guard.py, hooks/hooks.json]
    detail: >
      Normalize tool_input defensively in main(): if command isn't a string, treat as empty
      / deny with a clear "couldn't parse command" message, and make the log visible. Add an
      input-length cap (~100 KB) and a "timeout" to both hooks/hooks.json entries.

  - id: R5
    title: Make the adapter test assert real parity; add CI
    fixes: [F16, F15, F17, F18, F19]
    where: [adapters/tests/parity.test.ts, adapters/]
    detail: >
      Shell out to hooks/scripts/tannedpy_guard.py and assert the TS evaluate() matches the
      Python decision for every case (incl. `python3 'unterminated`). Add
      package.json/tsconfig.json and a CI workflow running both `uv run pytest` and
      `bun test`. Decide F15's direction (deny-leaning so both agree). Thicken
      opencode-permissions.json to mirror wrapper_commands + -m pip/-m venv. Have TS adapters
      reload patterns per-call or watch the file.

  - id: R6
    title: (Strategic) real shell parser OR deny-by-default allow-list
    fixes: [F3]
    where: [hooks/scripts/tannedpy_guard.py]
    detail: >
      The regex-on-first-token core cannot be made robust by patching. Either parse with a
      shell AST (e.g. bashlex) to enumerate every command node (incl. inside $(...), -c
      strings, pipelines), or invert to an allow-list (allow only vetted leading tokens,
      flag anything reaching a python/pip token). Pursue only to market as a security control.

  - id: R7
    title: Documentation truth-up
    fixes: [F21, F20, F24, F25, F26]
    where: [README.md, .plugin/plugin.json, marketplace.json]
    detail: >
      Reword README:11-12 to describe actual behavior (guard always denies; the SessionStart
      banner is what goes inert without uv) — see F21 reviewer_note re: the shebang. Add a
